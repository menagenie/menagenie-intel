name: Ménagénie Intel — refresh

on:
  # Sundays at 11:00 UTC = 7:00 AM EDT / 6:00 AM EST.
  # Change the cron string if you want a different time/cadence.
  # https://crontab.guru/ helps you pick.
  schedule:
    - cron: "0 11 * * 0"
  workflow_dispatch:  # manual "run now" button in the Actions tab

permissions:
  contents: write  # required to commit refreshed data back to the repo
  issues: write    # required to open/update an issue when the refresh fails

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Run refresh pipeline
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python3 refresh.py

      - name: Commit refreshed data + dashboard
        run: |
          git config user.name  "menagenie-intel-bot"
          git config user.email "menagenie-intel-bot@users.noreply.github.com"
          git add data/ thumbs/ clips/ index.html || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Intel refresh: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "refresh-failed" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "Nouvel échec le $(date -u +%Y-%m-%d) : $RUN_URL"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "⚠️ Ménagénie Intel — le refresh a échoué" \
              --body "Le refresh automatique a échoué le $(date -u +%Y-%m-%d).

Détails du run : $RUN_URL

Cette issue reste ouverte tant que le problème n'est pas réglé — les échecs suivants seront ajoutés ici en commentaire au lieu de créer une nouvelle issue. Ferme-la une fois corrigé." \
              --label "refresh-failed"
          fi
